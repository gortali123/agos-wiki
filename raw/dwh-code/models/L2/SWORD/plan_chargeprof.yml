version: 2
models:
  - name: plan_chargeprof
    config:
      materialized: incremental
      incremental_strategy: insert_overwrite
      query_tag: '{"app": "DBT", "schema": "L2_SWORD", "entita": "PLAN_CHARGEPROF"}'
    constraints:
      - type: primary_key
        columns: [CD_PRATICA, CD_PIANO, NM_START, TP_CALCOLO]
    columns:
      - name: DT_RIFERIMENTO
        data_type: DATE
      - name: CD_CLIENTE
        data_type: NUMBER(10,0)
      - name: CD_PRATICA
        data_type: VARCHAR(17)
      - name: CD_PIANO
        data_type: VARCHAR(30)
      - name: TP_CALCOLO
        data_type: VARCHAR(7)
      - name: NM_START
        data_type: NUMBER
      - name: NM_END
        data_type: NUMBER
      - name: CD_PAGATORE
        data_type: VARCHAR(6)
      - name: TP_INTERESSE_BASE
        data_type: VARCHAR(7)
      - name: NM_INTERESSE
        data_type: NUMBER(5,3)
      - name: NM_VARIANZA_INTSS_PIA
        data_type: NUMBER(5,3)
      - name: NM_VARIANZA_INTSS_CLI
        data_type: NUMBER(5,3)
