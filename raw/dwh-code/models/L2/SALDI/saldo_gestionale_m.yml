version: 2
models:
  - name: saldo_gestionale_m
    config:
      materialized: incremental
      incremental_strategy: append
      query_tag: '{"app": "DBT", "schema": "L2_SALDI", "entita": "SALDO_GESTIONALE_M"}'
      pre_hook: "{{ delete_month() }}"
    constraints:
      - type: primary_key
        warn_unenforced: false
        columns: [CD_PRATICA, TP_PROCEDURA, DT_OSSERVAZIONE]
    columns:
      - name: CD_PRATICA
        data_type: NUMBER(12,0)
      - name: TP_PROCEDURA
        data_type: VARCHAR(2)
      - name: DT_OSSERVAZIONE
        data_type: DATE
      - name: CD_PRATICA_CLIENTE
        data_type: NUMBER(12,0)
      - name: CD_CONTROPARTE
        data_type: VARCHAR(9)
      - name: EU_IMPIEGO_GESTIONALE
        data_type: NUMBER(13,2)
      - name: EU_CAPITALE_SCADERE
        data_type: NUMBER(13,2)
      - name: EU_INTERESSI_SCADERE
        data_type: NUMBER(13,2)
      - name: EU_SPESE_SCADERE
        data_type: NUMBER(13,2)
      - name: EU_CAPITALE_SCADUTO
        data_type: NUMBER(13,2)
      - name: EU_INTERESSI_SCADUTO
        data_type: NUMBER(13,2)
      - name: EU_SPESE
        data_type: NUMBER(13,2)
      - name: EU_MORA
        data_type: NUMBER(13,2)
      - name: EU_SALDO_AVERE
        data_type: NUMBER(13,2)
      - name: EU_ANTICIPI_EROGATI
        data_type: NUMBER(13,2)
      - name: EU_PAG_ESUB_NON_ALLOCATI
        data_type: NUMBER(13,2)
      - name: EU_INTERESSI_MATURATI_SCADERE
        data_type: NUMBER(13,2)
      - name: EU_RATEO
        data_type: NUMBER(13,2)
      - name: EU_RISCONTI
        data_type: NUMBER(13,2)
      - name: EU_RISCONTI_ALTRI
        data_type: NUMBER(13,2)
      - name: EU_RISCONTI_INTERESSI
        data_type: NUMBER(13,2)
