version: 2
models:
  - name: precrif_input
    description: >
      L2 SCORING PRECRIF_INPUT - input della strategia PRECRIF estratto dal payload XML
      della landing CDE (StrategyOneRequest, ProcessCode = 'PRECRIF'). Grana per soggetto
      (PK CD_INQUIRYCODE + CD_RUOLO): campi a livello pratica dalla Richiesta/Variables e
      Header, campi soggetto dal FLATTEN degli Applicant.
      ASSUNZIONI da validare: (1) landing = ref('cde') con VALUE variant; (2) filtro
      ProcessCode 'PRECRIF' (lo xsd dichiara fixed 'PRECRIFX'); (3) TS_INSERIMENTO valorizzato
      con CURRENT_TIMESTAMP() perche' assente dal data model; (4) blocco incrementale S2 non
      applicabile (nessun LASTMODIFIEDDATA nella landing) - da riconciliare prima della prod;
      (5) 5 campi PUNTO_VENDITA senza tag corrispondente nello xsd -> NULL;
      (6) TP_INTERMEDIARIO duplicato nel data model, secondo campo esposto come TP_INTERMEDIARIO_2.
    config:
      materialized: incremental
      incremental_strategy: append
      query_tag: '{"app": "DBT", "schema": "L2_SCORING", "entita": "PRECRIF_INPUT"}'
    constraints:
      - type: primary_key
        warn_unenforced: false
        columns: [CD_INQUIRYCODE, TS_INSERIMENTO] # WARN: Da inserire CD_RUOLO come PK al momento risulta NULL
    columns:
      - name: CD_INQUIRYCODE
        data_type: VARCHAR(255)
      - name: CD_RUOLO
        data_type: VARCHAR
      - name: TS_INSERIMENTO
        data_type: TIMESTAMP_NTZ
      - name: CD_PROCESSCODE
        data_type: VARCHAR(8)
      - name: CD_INTERROGAZIONE
        data_type: NUMBER(16,0)
      - name: CD_USER_CODE
        data_type: VARCHAR
      - name: DT_RICHIESTA
        data_type: DATE
      - name: CD_PROCEDURA
        data_type: VARCHAR
      - name: CD_PRATICA
        data_type: NUMBER(16,0)
      - name: CD_PRESCREENING_ESITO
        data_type: VARCHAR
      - name: CD_PRATICHE_IN_VOLO
        data_type: VARCHAR
      - name: NM_RATE_1PERIODO
        data_type: NUMBER(16,0)
      - name: NM_RATE_2PERIODO
        data_type: NUMBER(16,0)
      - name: EU_IMPORTO_RATA_1PERIODO
        data_type: NUMBER(16,2)
