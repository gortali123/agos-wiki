version: 2
models:
  - name: accettazione_input_cat_agg
    description: >
      Entita' L2 ACCETTAZIONE_INPUT_CAT_AGG (SA SCORING), grana per nodo CATENA_AGGIUNTIVA.
      Tutti i campi dal nodo ripetuto CATENA_AGGIUNTIVA/Variables.
      NOTA: i 4 campi rete-vendita mappati sui tag CATENA (MacroAreaRete/StatoRete/...), verificare.
      ASSUNZIONI: landing=ref('cde'); ProcessCode 'TARGATO'; TS_INSERIMENTO=TS_RIFERIMENTO L1.
    config:
      materialized: incremental
      incremental_strategy: append
      query_tag: '{"app": "DBT", "schema": "L2_SCORE_BANCHE_DATI", "entita": "ACCETTAZIONE_INPUT_CAT_AGG"}'
    constraints:
      - type: primary_key
        warn_unenforced: false
        columns: [CD_INQUIRYCODE, NM_POSIZIONE_AGG, TS_INSERIMENTO]
    columns:
      - name: CD_INQUIRYCODE
        data_type: VARCHAR(255)
      - name: NM_POSIZIONE_AGG
        data_type: NUMBER(16,0)
      - name: TS_INSERIMENTO
        data_type: TIMESTAMP_NTZ
      - name: CD_PROCESSCODE
        data_type: VARCHAR
      - name: CD_RETE_VENDITA_AGG
        data_type: VARCHAR
      - name: CD_AGENTE_AGG
        data_type: VARCHAR
      - name: CD_SUBAGENTE_AGG
        data_type: VARCHAR
      - name: CD_MACROAREA_RETE_VENDITA
        data_type: VARCHAR
      - name: CD_STATO_RETE_VENDITA
        data_type: VARCHAR
      - name: CD_ATTRIBUTO_RETE_VENDITA
        data_type: VARCHAR
      - name: TP_RETE_VENDITA
        data_type: VARCHAR
      - name: CD_MACROAREA_AGENTE
        data_type: VARCHAR
      - name: CD_STATO_AGENTE
        data_type: VARCHAR
      - name: CD_ATTRIBUTO_AGENTE
        data_type: VARCHAR
      - name: TP_AGENTE
        data_type: VARCHAR
      - name: CD_MACROAREA_SUBAGENTE
        data_type: VARCHAR
      - name: CD_STATO_SUBAGENTE
        data_type: VARCHAR
      - name: CD_ATTRIBUTO_SUBAGENTE
        data_type: VARCHAR
      - name: TP_SUBAGENTE
        data_type: VARCHAR