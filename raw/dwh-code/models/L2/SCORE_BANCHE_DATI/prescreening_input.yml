version: 2
models:
  - name: prescreening_input
    description: >
      Entita' L2 PRESCREENING_INPUT (SA SCORING), grana per Applicant.
      Sorgente: landing XML CDE, payload StrategyOneRequest, ProcessCode = 'PRESCREENING'.
      Estrazione via macro get_xml_path / flatten_xml.
      ASSUNZIONI da validare: (1) nome reale della landing CDE = ref('cde');
      (2) filtro riga su ProcessCode letto dal PERIMETRO = 'PRESCREENING' (lo xsd dichiara
      fixed="PRESCREENINGX" nell'Header: verificare quale valore compare davvero nel payload
      in produzione, altrimenti il modello resta a zero righe);
      (3) storicizzazione S2 con TS_INSERIMENTO valorizzato dal campo TS_RIFERIMENTO della L1
      (non da LASTMODIFIEDDATA ne' CURRENT_TIMESTAMP), incrementale append filtrato su TS_RIFERIMENTO;
      (4) TP_INTERMEDIARIO_TIPOLOGIA: nel data model figura una seconda colonna omonima TP_INTERMEDIARIO
      (RF = TIPOLOGIA_INTERMEDIARIO), rinominata per evitare collisione;
      (5) EU_ANTICIPO ha tipo VARCHAR(13,2) nel data model (anomalo per un EU_): mantenuto stringa.
    config:
      materialized: incremental
      incremental_strategy: append
      query_tag: '{"app": "DBT", "schema": "L2_SCORE_BANCHE_DATI", "entita": "PRESCREENING_INPUT"}'
    constraints:
      - type: primary_key
        warn_unenforced: false
        columns: [CD_INQUIRYCODE, CD_RUOLO, TS_INSERIMENTO]
    columns:
      - name: CD_INQUIRYCODE
        data_type: VARCHAR(255)
      - name: CD_RUOLO
        data_type: VARCHAR
      - name: TS_INSERIMENTO
        data_type: TIMESTAMP_NTZ
      - name: CD_PROCESSCODE
        data_type: VARCHAR
      - name: CD_INTERROGAZIONE
        data_type: NUMBER(16,0)
      - name: CD_USER_CODE
