version: 2

models:
  - name: elenco_conti_sval_o
    config:
      materialized: table
    constraints:
      - type: primary_key
        warn_unenforced: false
        columns: [CD_CONTO]
    columns:
      - name: CD_CONTO
        data_type: NUMBER(6)
      - name: DT_INI_VALI
        data_type: DATE
      - name: DT_FINE_VALI
        data_type: DATE
