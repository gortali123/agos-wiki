version: 2
models:
  - name: wfl_istanza
    config:
      materialized: incremental
      incremental_strategy: merge
      unique_key: [CD_ISTANZA, TS_INIZIO_VALIDITA]
      pre_hook:
        - "{{ delete_l2('wfisfwfl', ['CD_ISTANZA'], ['WFISWFL_ISTANZA']) }}"
    constraints:
      - type: primary_key
        warn_unenforced: false
        columns: [CD_ISTANZA, TS_INIZIO_VALIDITA]
    columns:
      - name: CD_ISTANZA
        data_type: NUMBER(12,0)
      - name: TS_INIZIO_VALIDITA
        data_type: TIMESTAMP_NTZ
      - name: TS_FINE_VALIDITA
        data_type: TIMESTAMP_NTZ
      - name: CD_PRATICA
        data_type: NUMBER(12,0)
      - name: CD_WORKFLOW
        data_type: VARCHAR(10)
      - name: CD_AREA_WORKFLOW
        data_type: VARCHAR(2)
      - name: CD_ZONA
        data_type: VARCHAR(3)
      - name: CD_STATO_ISTANZA
        data_type: VARCHAR(1)
      - name: DS_STATO_ISTANZA
        data_type: VARCHAR(30)
      - name: TS_CREAZIONE_ISTANZA
        data_type: TIMESTAMP_NTZ
      - name: CD_UTENTE_ULT_MODIFICA_ISTANZA
        data_type: VARCHAR(10)
      - name: TS_ULT_MODIFICA_ISTANZA
        data_type: TIMESTAMP_NTZ
      - name: TS_CHIUSURA_ISTANZA
        data_type: TIMESTAMP_NTZ
      - name: CD_PRG_SIN
        data_type: NUMBER(3,0)
      - name: CD_PRG_PSV
        data_type: NUMBER(11,0)
      - name: CD_AZIONE_PSV
        data_type: VARCHAR(3)
      - name: CD_PROG_RICICLO
        data_type: NUMBER(3,0)
      - name: CD_PRG_RET
        data_type: NUMBER(3,0)
      - name: CD_LIQ_SC
        data_type: VARCHAR(1)
      - name: DT_COM_SIN
        data_type: DATE
      - name: CD_SIN
        data_type: VARCHAR(2)
      - name: CD_CLASS_SIN
        data_type: VARCHAR(3)
      - name: TP_SIN
        data_type: VARCHAR(1)
      - name: CD_STATO_SIN
        data_type: VARCHAR(2)
      - name: CD_ASS_SIN
        data_type: NUMBER(9,0)
      - name: CD_STATO_PSV
        data_type: VARCHAR(2)
      - name: CD_BLOCCO_PSV
        data_type: VARCHAR(2)
      - name: PR_PSV_EXT
        data_type: NUMBER(11,0)
      - name: DS_NOTE
        data_type: VARCHAR(30)
      - name: LASTMODIFIEDDATA
        data_type: TIMESTAMP_NTZ
