version: 2

models:
  - name: aiecfparcl
    config:
      materialized: incremental
      incremental_strategy: merge
      unique_key: ['aiparcl_pratica', 'aiparcl_progressivo', 'aiparcl_prog_var']
      post_hook: "{{ logic_delete_merge() }}"
      meta:
        cluster: ["A2"]
      query_tag: '{"app":"DBT", "sorgente":"OCS", "schema":"L1_O_AIN", "archivio":"AIECFPARCL"}'
    constraints:
      - type: primary_key
        warn_unenforced: false
        columns: [aiparcl_pratica, aiparcl_progressivo, aiparcl_prog_var]
    columns:
      - name: ts_riferimento
        data_type: TIMESTAMP_NTZ
      - name: ts_caricamento
        data_type: TIMESTAMP_NTZ
      - name: fl_deleted
        data_type: VARCHAR(1)
      - name: ts_deleted
        data_type: TIMESTAMP_NTZ
      - name: sys_change_operation
        data_type: VARCHAR
      - name: lastmodifieddata
        data_type: TIMESTAMP_NTZ
      - name: aiparcl_pratica
        data_type: NUMBER(12,0)
      - name: aiparcl_progressivo
        data_type: NUMBER(9,0)
      - name: aiparcl_prg_fattura
        data_type: NUMBER(9,0)
      - name: aiparcl_tipo_fatt
        data_type: VARCHAR(2)
      - name: aiparcl_tipo_generaz
        data_type: VARCHAR(1)
      - name: aiparcl_proc_rif
        data_type: VARCHAR(2)
      - name: aiparcl_data_elaborazione
        data_type: NUMBER(8,0)
      - name: aiparcl_prog_var
        data_type: NUMBER(9,0)
      - name: aiparcl_data_variazione
        data_type: NUMBER(8,0)
      - name: aiparcl_ora_variazione
        data_type: NUMBER(8,0)
      - name: aiparcl_operatore
        data_type: VARCHAR(10)
      - name: aiparcl_tipo_operazione
        data_type: VARCHAR(1)
      - name: aiparcl_importo_rda
        data_type: NUMBER(13,0)
      - name: rowid
        data_type: NUMBER(38, 0)
