version: 2

models:
  - name: aiecfparc
    config:
      materialized: incremental
      incremental_strategy: insert_overwrite
      meta:
        cluster: ["B1"]
      query_tag: '{"app":"DBT", "sorgente":"OCS", "schema":"L1_O_AIN", "archivio":"AIECFPARC"}'
    constraints:
      - type: primary_key
        warn_unenforced: false
        columns: [aiecparc_pratica, aiecparc_progressivo]
    columns:
      - name: ts_riferimento
        data_type: TIMESTAMP_NTZ
      - name: ts_caricamento
        data_type: TIMESTAMP_NTZ
      - name: sys_change_operation
        data_type: VARCHAR
      - name: lastmodifieddata
        data_type: TIMESTAMP_NTZ
      - name: aiecparc_pratica
        data_type: NUMBER(12,0)
      - name: aiecparc_progressivo
        data_type: NUMBER(9,0)
      - name: aiecparc_prg_fattura
        data_type: NUMBER(9,0)
      - name: aiecparc_tipo_fatt
        data_type: VARCHAR(2)
      - name: aiecparc_tipo_generaz
        data_type: VARCHAR(1)
      - name: aiecparc_proc_rif
        data_type: VARCHAR(2)
      - name: aiecparc_data_elaborazione
        data_type: NUMBER(8,0)
      - name: aiecparc_importo_rda
        data_type: NUMBER(13,0)
      - name: rowid
        data_type: NUMBER(38, 0)
