version: 2

models:
  - name: aictfstl
    config:
      materialized: incremental
      incremental_strategy: merge
      unique_key: ['rowid']
      post_hook: "{{ logic_delete_merge() }}"
      meta:
        cluster: ["A1"]
      query_tag: '{"app":"DBT", "sorgente":"OCS", "schema":"L1_O_AIN", "archivio":"AICTFSTL"}'
    constraints:
      - type: primary_key
        warn_unenforced: false
        columns: [rowid]
    columns:
      - name: ts_riferimento
        data_type: TIMESTAMP_NTZ
      - name: ts_caricamento
        data_type: TIMESTAMP_NTZ
      - name: fl_deleted
        data_type: VARCHAR(1)
      - name: ts_deleted
        data_type: TIMESTAMP_NTZ
      - name: sys_change_operation
        data_type: VARCHAR
      - name: lastmodifieddata
        data_type: TIMESTAMP_NTZ
      - name: aictstl_pratica
        data_type: NUMBER(12,0)
      - name: aictstl_stato
        data_type: VARCHAR(2)
      - name: aictstl_attributo
        data_type: VARCHAR(2)
      - name: aictstl_data
        data_type: NUMBER(8,0)
      - name: aictstl_ora
        data_type: NUMBER(8,0)
      - name: aictstl_utente
        data_type: VARCHAR(10)
      - name: rowid
        data_type: NUMBER(38, 0)
