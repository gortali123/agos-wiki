version: 2

models:
  - name: browser
    config:
      materialized: table
      meta:
        cluster: ["TBD"]
      query_tag: '{"app":"DBT", "sorgente":"ADOBE", "schema":"L1_E_ADOBE", "archivio":"BROWSER"}'
    constraints:
      - type: primary_key
        warn_unenforced: false
        columns: [id]
    columns:
      - name: ts_riferimento
        data_type: TIMESTAMP_NTZ
      - name: ts_caricamento
        data_type: TIMESTAMP_NTZ
      - name: id
        data_type: NUMBER(32,0)
      - name: ds_browser
        data_type: VARCHAR(100)
