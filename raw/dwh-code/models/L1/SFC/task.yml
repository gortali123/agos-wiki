version: 2

models:
  - name: task
    config:
      materialized: table
      meta:
        cluster: ["TBD"]
      query_tag: '{"app":"DBT", "sorgente":"SFC", "schema":"L1_E_SFC", "archivio":"TASK"}'
    constraints:
      - type: primary_key
        warn_unenforced: false
        columns: [id]
    columns:
      - name: ts_riferimento
        data_type: TIMESTAMP_NTZ
      - name: ts_caricamento
        data_type: TIMESTAMP_NTZ
      - name: id
        data_type: VARCHAR(18)
      - name: owner_federationidentifier
        data_type: VARCHAR(255)
      - name: description
        data_type: VARCHAR(3200)
      - name: what_case_externalkey__c
        data_type: VARCHAR(255)
      - name: what_account_externalkey__c
        data_type: VARCHAR(255)
      - name: createdby_federationidentifier
        data_type: VARCHAR(255)
      - name: subject
        data_type: VARCHAR(255)
      - name: priority
        data_type: VARCHAR(255)
      - name: activitydate
        data_type: TIMESTAMP_NTZ
      - name: status
        data_type: VARCHAR(255)
      - name: lastmodifiedby_federationidentifier
        data_type: VARCHAR(255)
      - name: createddate
        data_type: TIMESTAMP_NTZ
      - name: lastmodifieddate
        data_type: TIMESTAMP_NTZ
      - name: completeddatetime
        data_type: TIMESTAMP_NTZ
      - name: recordtype_name
        data_type: VARCHAR(255)
