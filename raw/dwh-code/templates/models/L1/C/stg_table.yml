version: 2

models:
  - name: stg_<table>
    config:
      materialized: ephemeral
      meta:
        cluster: ["C"]
    columns:
      - name: ts_riferimento
        data_type: TIMESTAMP_NTZ
      - name: ts_caricamento
        data_type: TIMESTAMP_NTZ
      - name: fl_deleted
        data_type: VARCHAR(1)
      - name: ts_deleted
        data_type: TIMESTAMP_NTZ
      - name: sys_change_operation
        data_type: VARCHAR
      - name: lastmodifieddata
        data_type: TIMESTAMP_NTZ
      - name: <col1>
        data_type: <dtype>
      # ...
      - name: rowid
        data_type: NUMBER(38, 0)
