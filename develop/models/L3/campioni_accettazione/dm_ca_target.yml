version: 2
models:
  - name: dm_ca_target
    config:
      materialized: incremental
      incremental_strategy: append
    constraints:
      - type: primary_key
        warn_unenforced: false
        columns: [CD_PRATICA, TP_PROCEDURA, DT_OSSERVAZIONE]
    columns:
      - name: CD_PRATICA
        data_type: VARCHAR(10)
      - name: TP_PROCEDURA
        data_type: CHAR(2)
      - name: DT_OSSERVAZIONE
        data_type: DATE
      - name: CA_TARGET_T_NM_MESI
        data_type: NUMBER(10,0)
      - name: CA_TARGET_T_NM_MESI_VALU
        data_type: NUMBER(10,0)
      - name: CA_TARGET_T_NM_WORST##
        data_type: NUMBER(10,0)
