version: 2
models:
  - name: dm_co_matrix
    config:
      materialized: incremental
      incremental_strategy: append
    constraints:
      - type: primary_key
        warn_unenforced: false
        columns: [CD_PRATICA, TP_PROCEDURA, DT_OSSERVAZIONE]
    columns:
      - name: CD_PRATICA
        data_type: VARCHAR(10)
      - name: TP_PROCEDURA
        data_type: CHAR(2)
      - name: DT_OSSERVAZIONE
        data_type: DATE
      - name: CO_MATRIX_T_DT_APPOGGIO
        data_type: DATE
      - name: CO_MATRIX_T_DT_CALA_FINE_##
        data_type: DATE
      - name: CO_MATRIX_T_DT_MORA_FINE_##
        data_type: DATE
      - name: CO_MATRIX_T_DT_CALA_INIZ_##
        data_type: DATE
      - name: CO_MATRIX_T_DT_MORA_INIZ_##
        data_type: DATE
      - name: CO_MATRIX_T_NM_MESI_VALUTAZIONE
        data_type: NUMBER(10,0)
      - name: CO_MATRIX_T_NM_IMP_CURRENT_ACCO##
        data_type: NUMBER(10,0)
      - name: CO_MATRIX_T_NM_IMPAGATO_CURRENT##
        data_type: NUMBER(10,0)
