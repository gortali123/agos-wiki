version: 2
models:
  - name: wfl_sottofase
    config:
      materialized: incremental
      incremental_strategy: merge
      unique_key: [CD_ISTANZA, CD_FASE, CD_SOTTOFASE, TS_INIZIO_VALIDITA]
      query_tag: '{"app": "DBT", "schema": "L2_ONBOARDING", "entita": "WFL_SOTTOFASE"}'
      pre_hook:
        - "{{ delete_l2('wfisfsf', ['CD_ISTANZA', 'CD_FASE', 'CD_SOTTOFASE'], ['WFISSF_ISTANZA', 'WFISSF_FASE', 'WFISSF_SOTTOFASE']) }}"
    constraints:
      - type: primary_key
        warn_unenforced: false
        columns: [CD_ISTANZA, CD_FASE, CD_SOTTOFASE, TS_INIZIO_VALIDITA]
    columns:
      - name: CD_ISTANZA
        data_type: NUMBER(12,0)
      - name: CD_FASE
        data_type: VARCHAR(10)
      - name: CD_SOTTOFASE
        data_type: VARCHAR(10)
      - name: TS_INIZIO_VALIDITA
        data_type: TIMESTAMP_NTZ
