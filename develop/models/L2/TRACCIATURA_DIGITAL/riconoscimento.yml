version: 2
models:
  - name: riconoscimento
    config:
      materialized: incremental
      incremental_strategy: merge
      unique_key: [CD_IDE, TS_INIZIO_VALIDITA]
      query_tag: '{"app": "DBT", "schema": "L2_DIGITAL", "entita": "RICONOSCIMENTO"}'
    constraints:
      - type: primary_key
        warn_unenforced: false
        columns: [CD_IDE, TS_INIZIO_VALIDITA]
    columns:
      - name: CD_IDE
        data_type: NUMBER(13)
      - name: PRG_SIMULAZIONE
        data_type: NUMBER(12)
      - name: TS_INIZIO_VALIDITA
        data_type: TIMESTAMP_NTZ
      - name: TS_FINE_VALIDITA
        data_type: TIMESTAMP_NTZ
      - name: FL_CANCELLATO
        data_type: VARCHAR(1)
      - name: TP_PROCEDURA
        data_type: CHAR(2)
      - name: CD_PRATICA
        data_type: NUMBER(12)
      - name: CD_CONTROPARTE
        data_type: NUMBER(9)
      - name: CD_RAPPORTO
        data_type: CHAR(2)
      - name: PRG_RAPPORTO
        data_type: NUMBER(2)
      - name: CD_MODALITA_IDE
        data_type: CHAR(1)
      - name: TP_IDE_REMOTO
        data_type: CHAR(3)
      - name: TP_IDE_REMOTO_COMP
        data_type: CHAR(3)
      - name: DS_TIPO_IDE_PERS
        data_type: VARCHAR(50)
      - name: FL_AUTOCERT_PSOG
        data_type: VARCHAR(1)
      - name: FL_IDENTIF_COMPLETATA
        data_type: VARCHAR(1)
      - name: DT_IDENTIF_COMPLETATA
        data_type: DATE
      - name: NM_ORA_IDENTIF_COMPLETATA
        data_type: NUMBER(8)
      - name: FL_GIA_CLIENTE
        data_type: VARCHAR(1)
      - name: CD_GIA_CLIENTE_TDOC
        data_type: CHAR(3)
      - name: NM_GIA_CLIENTE_NDOC
        data_type: VARCHAR(14)
      - name: CD_APPL_PROV
        data_type: CHAR(3)
      - name: CD_APPL_DETT
        data_type: CHAR(3)
      - name: DS_EMAIL
        data_type: VARCHAR(256)
      - name: DS_CELLULARE
        data_type: VARCHAR(30)
