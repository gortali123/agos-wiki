version: 2
models:
- name: variazioni_stato_prat
  config:
    materialized: incremental
    incremental_strategy: merge
    unique_key: [TP_PROCEDURA, CD_PRATICA, TS_INIZIO_VALIDITA]
    query_tag: '{"app": "DBT", "schema": "L2_PRODOTTO", "entita": "VARIAZIONI_STATO_PRAT"}'
  constraints:
    - type: primary_key
      warn_unenforced: false
      columns: [TP_PROCEDURA, CD_PRATICA, TS_INIZIO_VALIDITA]
  columns:
  - name: TP_PROCEDURA
    data_type: VARCHAR(2)
  - name: CD_PRATICA
    data_type: NUMBER(16,0)
  - name: TS_INIZIO_VALIDITA
    data_type: TIMESTAMP_NTZ
  - name: TS_FINE_VALIDITA
    data_type: TIMESTAMP_NTZ
  - name: CD_STATO
    data_type: VARCHAR(2)
  - name: DS_STATO
    data_type: VARCHAR(50)
  - name: CD_ATTRIBUTO
    data_type: VARCHAR(2)
  - name: DS_ATTRIBUTO
    data_type: VARCHAR(50)
  - name: CD_UTENTE
    data_type: VARCHAR(10)
  - name: CD_EVENTO
    data_type: VARCHAR(5)
  - name: LASTMODIFIEDDATA
    data_type: TIMESTAMP_NTZ
