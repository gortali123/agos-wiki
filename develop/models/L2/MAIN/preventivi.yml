version: 2
models:
  - name: preventivi
    config:
      materialized: incremental
      incremental_strategy: append
      query_tag: '{"app": "DBT", "schema": "L2_CONTATTI", "entita": "PREVENTIVI"}'
    constraints:
      - type: primary_key
        warn_unenforced: false
        columns: [CD_PREVENTIVO, NM_SIMULAZIONE, TS_INSERIMENTO]
    columns:
      - name: CD_PREVENTIVO
        data_type: NUMBER(12)
      - name: CD_PRATICA
        data_type: NUMBER(12)
      - name: NM_SIMULAZIONE
        data_type: NUMBER(12)
      - name: TP_PROCEDURA
        data_type: CHAR(2)
      - name: CD_CLIENTE
        data_type: NUMBER(9)
      - name: CD_STATO_PREV
        data_type: CHAR(2)
      - name: DS_STATO_PREV
        data_type: CHAR(2)
      - name: TS_INSERIMENTO
        data_type: TIMESTAMP_NTZ
      - name: CD_ATTRIBUTO
        data_type: CHAR(2)
      - name: CD_ORIGINE_CONTATTO
        data_type: CHAR(3)
      - name: CD_CANALE_ACQ
        data_type: CHAR(3)
      - name: DS_SPORTELLO
        data_type: CHAR(20)
      - name: FL_ASSICURAZIONE
        data_type: CHAR(1)
      - name: FL_CONVERTITO_PRATICA
        data_type: CHAR(1)
