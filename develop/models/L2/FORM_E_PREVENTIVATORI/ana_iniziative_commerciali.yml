version: 2
models:
  - name: ana_iniziative_commerciali
    config:
      materialized: incremental
      incremental_strategy: insert_overwrite
      query_tag: '{"app": "DBT", "schema": "L2_DIGITAL", "entita": "ANA_INIZIATIVE_COMMERCIALI"}'
    constraints:
      - type: primary_key
        warn_unenforced: false
        columns: [CD_INIZIATIVA]
    columns:
      - name: CD_INIZIATIVA
        data_type: VARCHAR(20)
      - name: DS_INIZIATIVA
        data_type: VARCHAR(100)
      - name: DT_INIZIO_VALIDITA
        data_type: DATE
      - name: DT_FINE_VALIDITA
        data_type: DATE
      - name: SIGLA_SOCIETA
        data_type: VARCHAR(3)
      - name: CD_FILIALE_DEFAULT
        data_type: VARCHAR(6)
      - name: CD_CAMPAGNA_INDIVIDUALE
        data_type: VARCHAR(20)
      - name: FL_ABIL_CARTE
        data_type: VARCHAR(1)
      - name: FL_ABIL_CONSUMO
        data_type: VARCHAR(1)
      - name: FL_NASCOSTO
        data_type: VARCHAR(1)
      - name: CD_SOGGETTO_TERZO
        data_type: VARCHAR(20)
      - name: FL_RIUTILIZZO_SU_CLI
        data_type: VARCHAR(1)
      - name: FL_LETTERA_DBT_CL
        data_type: VARCHAR(1)
      - name: FL_LETTERA_DBT_CO
        data_type: VARCHAR(1)
      - name: FL_LETTERA_DBT_GA
        data_type: VARCHAR(1)
      - name: FL_EMIS_FATT_CONTRIB
        data_type: VARCHAR(1)
      - name: FL_INIZIATIVA_ONLINE
        data_type: VARCHAR(1)
      - name: TP_CATEGORIA_INZIATIVA
        data_type: VARCHAR(9)
      - name: TP_MACROCATEGORIA_INIZIATIVA
        data_type: VARCHAR(9)
