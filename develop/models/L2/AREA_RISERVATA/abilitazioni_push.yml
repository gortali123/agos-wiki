version: 2
models:
  - name: abilitazioni_push
    config:
      materialized: incremental
      incremental_strategy: merge
      unique_key: [ID_DISPOSITIVO, TS_INIZIO_VALIDITA]
      query_tag: '{"app": "DBT", "schema": "L2_DIGITAL", "entita": "ABILITAZIONI_PUSH"}'
    constraints:
      - type: primary_key
        warn_unenforced: false
        columns: [ID_DISPOSITIVO, TS_INIZIO_VALIDITA]
    columns:
      - name: ID_DISPOSITIVO
        data_type: NUMBER(19)
      - name: CD_CLIENTE
        data_type: VARCHAR(255)
      - name: TS_INIZIO_VALIDITA
        data_type: TIMESTAMP_NTZ
      - name: TS_FINE_VALIDITA
        data_type: TIMESTAMP_NTZ
      - name: CD_UUID_DISPOSITIVO
        data_type: VARCHAR(255)
      - name: CD_MODELLO
        data_type: VARCHAR(255)
      - name: DS_PRODUTTORE
        data_type: VARCHAR(255)
      - name: CD_SISTEMA_OPERATIVO
        data_type: VARCHAR(255)
      - name: CD_VERSIONE_SO
        data_type: VARCHAR(255)
      - name: CD_FIREBASE
        data_type: VARCHAR(255)
      - name: CD_INTESI
        data_type: VARCHAR(255)
      - name: FL_ASSOCIAZIONE_ATTIVA
        data_type: VARCHAR(1)
