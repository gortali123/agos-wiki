version: 2
models:
  - name: accessi
    config:
      materialized: incremental
      incremental_strategy: insert_overwrite
      query_tag: '{"app": "DBT", "schema": "L2_DIGITAL", "entita": "ACCESSI"}'
    constraints:
      - type: primary_key
        warn_unenforced: false
        columns: [CD_CLIENTE, TS_LOGIN]
    columns:
      - name: CD_CLIENTE
        data_type: VARCHAR
      - name: TS_LOGIN
        data_type: TIMESTAMP_NTZ
      - name: CD_ID_SESSION
        data_type: VARCHAR
      - name: CD_IP
        data_type: VARCHAR
      - name: TS_LOGOUT
        data_type: TIMESTAMP_NTZ
      - name: TP_LOGOUT
        data_type: VARCHAR
      - name: DN_USER_AGENT_BROWSER_L
        data_type: VARCHAR
      - name: DN_USER_AGENT_BROWSER_C
        data_type: VARCHAR
      - name: DN_CANALE_RISPO
        data_type: VARCHAR
