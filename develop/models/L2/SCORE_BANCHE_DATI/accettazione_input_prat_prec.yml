version: 2
models:
  - name: accettazione_input_prat_prec
    description: >
      Entita' L2 ACCETTAZIONE_INPUT_PRAT_PREC (SA SCORING), grana per pratica precedente.
      Campi dal nodo ripetuto PRATICHE_PRECEDENTI/Variables; i tag reali sono prefissati 'PR_'.
      ASSUNZIONI: landing=ref('cde'); ProcessCode 'TARGATO'; TS_INSERIMENTO=TS_RIFERIMENTO L1;
      tipi inferiti dai prefissi (TIPO vuoto nel foglio).
    config:
      materialized: incremental
      incremental_strategy: append
      query_tag: '{"app": "DBT", "schema": "L2_SCORE_BANCHE_DATI", "entita": "ACCETTAZIONE_INPUT_PRAT_PREC"}'
    constraints:
      - type: primary_key
        warn_unenforced: false
        columns: [CD_INQUIRYCODE, TP_PROCEDURA, CD_PRATICA, TS_INSERIMENTO]
